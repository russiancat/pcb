# JLCPCB — 2-layer standard
# Source: github.com/labtroll/KiCad-DesignRules (community, cross-referenced with
#         JLCPCB capabilities page)
# Verify/update at: https://jlcpcb.com/capabilities/pcb-capabilities
name = "JLCPCB — 2-layer standard"
source_url = "https://jlcpcb.com/capabilities/pcb-capabilities"

[design_rules]
resolution_mm = 0.127
clearance_mm = 0.127
component_clearance_mm = 0.2
via_drill_mm = 0.3
via_annular_mm = 0.1   # pad = 0.3 + 2×0.1 = 0.5mm
via_cost = 4.0
edge_clearance_mm = 0.3

[drc]
min_via_diameter_mm = 0.5
min_pth_drill_mm = 0.2
max_pth_drill_mm = 6.3
min_npth_drill_mm = 0.5
min_hole_to_hole_mm = 0.5
min_silk_text_height_mm = 1.0  # stricter than PCBWay (0.8mm)
min_silk_clearance_mm = 0.15
